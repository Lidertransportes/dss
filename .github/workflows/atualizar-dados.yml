name: Atualizar Dados DSS

on:
  workflow_dispatch:

  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:

  atualizar:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

        with:
          node-version: 20

      - run: npm install

      - run: node atualizar.js

      - name: Commit

        run: |

          git config user.name "github-actions"

          git config user.email "github-actions@github.com"

          git add dados.json

          git diff --cached --quiet || git commit -m "Atualização automática"

          git push
